<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>V.A.L.E.U.R© — Votre Portrait</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCFAF7; --text: #2A2622; --text2: #4A4340; --text3: #8C827D;
            --gold: #C9A84C; --line: #E5E0D8; --card-bg: #F6F4F0;
            --rouge: #B5312A; --orange: #C4581F; --jaune: #B8930A;
            --vert: #2D7A4F; --bleu: #1D5F8A; --indigo: #5C3280; --violet: #7A3594;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; color: var(--text); }
        h1 { font-size: clamp(36px, 6vw, 56px); line-height: 1.1; margin-bottom: 8px; }
        h2 { font-size: 22px; margin-bottom: 16px; color: var(--gold); }
        .chroma-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--rouge), var(--orange), var(--jaune), var(--vert), var(--bleu), var(--indigo), var(--violet));
            margin-bottom: 48px;
        }
        .block {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px 28px;
            margin-bottom: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .mask-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
        }
        .mirror-phrase {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-style: italic;
            line-height: 1.5;
            color: var(--text);
            margin: 24px 0;
            padding-left: 16px;
            border-left: 3px solid var(--gold);
        }
        .reminder-box {
            background: #FFFDF7;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            text-align: center;
        }
        .reminder-box strong { color: var(--gold); font-weight: 500; }
        .metaphor-box {
            background: #FFFDF7;
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            font-style: italic;
        }
        .mechanism { display: flex; flex-direction: column; gap: 16px; margin: 24px 0; }
        .step { display: flex; gap: 16px; align-items: flex-start; }
        .step-num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--gold); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 14px; flex-shrink: 0;
        }
        .step-text { font-size: 15px; line-height: 1.6; }
        .force-box {
            background: linear-gradient(135deg, #FCFAF7 0%, #F3F1EC 100%);
            border-left: 3px solid var(--gold);
            padding: 20px 24px;
            border-radius: 0 8px 8px 0;
            margin: 24px 0;
        }
        .spa-section { display: flex; align-items: center; gap: 20px; margin: 32px 0; }
        .spa-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .spa-ring svg { transform: rotate(-90deg); }
        .spa-value {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px; color: var(--gold);
        }
        .hero-mask {
            text-align: center; padding: 48px 20px 40px; margin-bottom: 32px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(201,168,76,0.06) 100%);
            border: 1px solid rgba(201,168,76,0.15);
        }
        .hero-mask-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 8vw, 80px); font-weight: 300; line-height: 1;
            color: var(--text); margin-bottom: 12px;
        }
        .hero-separator { width: 60px; height: 2px; background: var(--gold); margin: 20px auto; }
        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px; font-style: italic; color: var(--text2);
            max-width: 500px; margin: 0 auto; line-height: 1.5;
        }
        .btn-print {
            display: inline-block; background: var(--gold); color: white;
            padding: 12px 28px; border-radius: 40px; font-size: 14px; font-weight: 500;
            text-decoration: none; cursor: pointer; border: none; margin-top: 16px;
        }
        .btn-print:hover { opacity: 0.9; }
        /* ── EMAIL ── */
        /* ── CTA ── */
        .cta-sep {
            width: 1px; height: 48px;
            background: linear-gradient(to bottom, transparent, rgba(201,168,76,.3), transparent);
            margin: 0 auto 32px;
        }
        .cta-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 36px;
            border: 1px solid rgba(42,38,34,.2); background: transparent;
            color: var(--text2); font-family: 'DM Sans', sans-serif;
            font-size: 11px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase;
            cursor: pointer; text-decoration: none; transition: all .25s;
        }
        .cta-btn:hover { border-color: var(--gold); color: var(--gold); }
        /* ── SHARE CARD ── */
        /* ── FOOTER ── */
        .footer-valeur {
            text-align: center; margin-top: 60px;
            border-top: 1px solid var(--line); padding-top: 28px;
        }
        .footer-valeur .fv-name {
            font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500;
            color: var(--text3); letter-spacing: .06em; margin-bottom: 5px;
        }
        .footer-valeur .fv-method {
            font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 600;
            letter-spacing: .3em; text-transform: uppercase;
            color: rgba(201,168,76,.55); margin-bottom: 5px;
        }
        .footer-valeur .fv-book {
            font-family: 'Cormorant Garamond', serif; font-size: 12px;
            font-style: italic; color: var(--text3); opacity: .7;
        }
        a { color: var(--gold); text-decoration: none; border-bottom: 1px solid transparent; transition: border .2s; }
        a:hover { border-bottom-color: var(--gold); }
        @media(max-width:600px) { .container { padding: 40px 16px 60px; } .block { padding: 24px 18px; } }


        /* ── COUVERTURE PORTRAIT ── */
        .cover-page{background:#FDFAF6;border:1px solid rgba(201,168,76,.18);border-radius:4px;padding:44px 40px 36px;margin-bottom:32px;position:relative;overflow:hidden;}
        /* barre chroma déjà dans .chroma-bar principal — pas de doublon */
        .cover-letterhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid rgba(201,168,76,.2);}
        .cover-brand{font-family:'DM Sans',sans-serif;}
        .cover-brand-main{font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
        .cover-brand-sub{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-top:3px;}
        .cover-meta{text-align:right;font-size:11px;color:var(--text3);line-height:1.7;}
        .cover-prenom-block{margin:28px 0 20px;}
        .cover-label{font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
        .cover-prenom{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,7vw,64px);font-weight:300;line-height:1.1;color:var(--text);letter-spacing:.02em;}
        .cover-divider{height:1px;background:linear-gradient(90deg,var(--gold),rgba(201,168,76,.15));margin:24px 0;}
        .cover-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.5vw,22px);font-style:italic;font-weight:300;line-height:1.55;color:var(--text);text-align:center;padding:4px 0 2px;}
        .cover-tagline-attr{text-align:center;font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:8px;}
        .cover-concept{margin:24px 0;padding:20px 22px;background:rgba(255,255,255,.7);border-left:3px solid rgba(201,168,76,.35);border-radius:0 4px 4px 0;}
        .cover-concept p{font-size:14px;color:var(--text2);line-height:1.85;margin:0;}
        .cover-findings{margin-top:24px;}
        .cover-findings-label{font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--text3);margin-bottom:16px;}
        .cover-masks{display:flex;gap:16px;flex-wrap:wrap;}
        .cover-mask-card{flex:1;min-width:180px;padding:16px 18px;border-radius:4px;border:1px solid rgba(0,0,0,.06);background:#fff;}
        .cover-mask-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;}
        .cover-mask-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;margin:8px 0 4px;letter-spacing:.03em;}
        .cover-mask-score{font-size:28px;font-weight:600;line-height:1;margin-bottom:6px;}
        .cover-mask-peur{font-size:12px;color:var(--text3);line-height:1.5;}
        @media(max-width:500px){.cover-masks{flex-direction:column;}.cover-page{padding:32px 22px 28px;}}
        @media print{
            .cover-page{background:white!important;border:1px solid #DDD!important;page-break-after:always;margin-bottom:0;}
            .cover-prenom{font-size:48pt;}
            .cover-tagline{font-size:16pt;}
            .cover-mask-score{font-size:22pt;}
        }
        /* ── RAPPORT PREMIUM ── */
        .rapport-header { display:none; }
        .rapport-footer { display:none; }
        .intro-dyade { border-top:3px solid var(--gold); }
        .mask-section { margin-bottom:0; }
        .mask-section-label {
            display:inline-block; padding:5px 18px; border-radius:0 20px 20px 0;
            font-size:11px; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
            margin-bottom:20px; margin-left:-28px;
        }
        .compact-block { margin-bottom:20px; padding:24px 22px; }
        .eyebrow { font-size:10px; font-weight:600; letter-spacing:.32em; text-transform:uppercase; color:rgba(201,168,76,.75); margin-bottom:8px; }
        .page-break-before { page-break-before:auto; }
        .no-print { }

        /* ── PRINT PREMIUM HD ── */
        @media print {
            @page { size:A4; margin:22mm 20mm 20mm 22mm; }
            @page :first { margin-top:15mm; }
            * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            body { background:white !important; color:#1A1714 !important; font-size:11.5pt; line-height:1.75; }
            .container { max-width:100%; padding:0; }

            /* Éléments masqués */
            .btn-print, #share-section,
            .no-print,
            .footer-valeur { display:none !important; }

            /* En-tête et pied de page rapport */
            .rapport-header { display:block !important; margin-bottom:24pt; }
            .rapport-footer { display:block !important; margin-top:24pt; }
            .print-only { display:block !important; }

            /* Blocs */
            .block { background:white !important; box-shadow:none !important;
                     border:1px solid #DDD !important; margin-bottom:14pt;
                     padding:18pt 16pt; page-break-inside:avoid; }
            .compact-block { padding:14pt 16pt; }
            .intro-dyade { border-top:3pt solid #C9A84C !important; }
            .hero-mask { background:white !important; border:1px solid #DDD !important;
                         page-break-after:avoid; }

            /* Typographie */
            h1 { font-size:26pt; }
            h2 { font-size:15pt; color:#1A1714 !important; }
            .mirror-phrase { font-size:14pt; border-left:3pt solid #C9A84C; }
            .hero-mask-name { font-size:32pt; }
            .metaphor-box { border-left:3pt solid #C9A84C; }

            /* Couleurs texte renforcées */
            .hero-tagline, p { color:#2A2622 !important; }
            [style*="color:var(--text2)"] { color:#2A2622 !important; }
            [style*="color:var(--text3)"] { color:#6B6460 !important; }

            /* Sauts de page */
            .page-break-before { page-break-before:always !important; }
            .mask-section { page-break-inside:avoid; }
            .mechanism { page-break-inside:avoid; }
            .force-box { page-break-inside:avoid; }
            .spa-ring { page-break-inside:avoid; }

            /* Veuve et orphelin */
            p { orphans:3; widows:3; }
            h2 { page-break-after:avoid; }
            h1 { page-break-after:avoid; }

            /* Barre chromatique */
            .chroma-bar { -webkit-print-color-adjust:exact; height:4pt; }

            /* Mask section label */
            .mask-section-label { margin-left:0 !important; border-radius:4px; }

            /* SPA ring */
            .spa-ring svg circle { stroke-width:6 !important; }

            /* Liens invisibles */
            a { color:inherit !important; text-decoration:none !important; border:none !important; }
            a[href]:after { content:none !important; }
        }
        /* (old print merged above) */
        @media print_DISABLED_OLD {
            @page { margin: 20mm 18mm; size: A4; }
            body { background: white; color: #1A1714; font-size: 12pt; }
            .container { max-width: 100%; padding: 0; }
            .block { box-shadow: none; background: white; border: 1px solid #ddd; margin-bottom: 16px; padding: 20px 18px; page-break-inside: avoid; }
            .hero-mask { background: white !important; border: 1px solid #ddd; page-break-after: avoid; }
            .mechanism { page-break-inside: avoid; }
            .btn-print, #share-section, .footer-valeur { display: none !important; }
            h2 { font-size: 16pt; }
            .mirror-phrase { font-size: 15pt; border-left: 3px solid #C9A84C; }
            .hero-mask-name { font-size: 36pt; }
            a[href]:after { content: none !important; }
            .chroma-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .step-num { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="chroma-bar"></div>
    <div id="portrait-content"><p style="text-align:center;padding:60px 20px;color:var(--text3);">Chargement du portrait…</p></div>
</div>

<div class="footer-valeur no-print">
    <div class="fv-name">Céline Bourbon · Psychologue</div>
    <div class="fv-method">Méthode V.A.L.E.U.R© · Tous droits réservés · © 2026</div>
    <div class="fv-book"><em>De la peur à la joie d'être soi</em> · Éditions L'Harmattan</div>
</div>

<script>
// ══════════════════════════════════
// CONFIG
// ══════════════════════════════════
const VERCEL_API  = 'https://valeur-backend-api.vercel.app/api';

const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
const MASK_COLORS = {
    rouge: '#B5312A', orange: '#C4581F', jaune: '#B8930A',
    vert: '#2D7A4F', bleu: '#1D5F8A', indigo: '#5C3280', violet: '#7A3594'
};
// Pastels : teinte masque à 12% sur fond crème
const MASK_PASTELS = {
    rouge:'rgba(181,49,42,.12)', orange:'rgba(196,88,31,.12)', jaune:'rgba(184,147,10,.12)',
    vert:'rgba(45,122,79,.12)', bleu:'rgba(29,95,138,.12)', indigo:'rgba(92,50,128,.12)', violet:'rgba(122,53,148,.12)'
};
const MASK_LABELS = {
    rouge: 'Rouge', orange: 'Orange', jaune: 'Jaune',
    vert: 'Vert', bleu: 'Bleu', indigo: 'Indigo', violet: 'Violet'
};
const TIEBREAK = ['jaune','rouge','indigo','vert','bleu','orange','violet'];
const MC = MASK_COLORS;   // alias court pour drawCard
const ML = MASK_LABELS;   // alias court pour drawCard
function hexRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

// Phrases fallback cartes (si PNG indisponible)
const CARD_MSG = {
    rouge:  "Et si c\u2019\u00e9tait grave cette fois-ci\u00a0?",
    orange: "Je comprends tout ce que je ressens. Je le vis moins.",
    jaune:  "Il me faut savoir avant de pouvoir avancer.",
    vert:   "Est-ce qu\u2019ils m\u2019aimeraient encore si je d\u00e9cevais\u00a0?",
    bleu:   "Si je ne tiens pas les r\u00eanes, quelque chose va m\u2019\u00e9chapper.",
    indigo: "Ce n\u2019est pas encore assez bien.",
    violet: "Je joue tellement bien mes r\u00f4les que je ne sais plus lequel est moi."
};

// ══════════════════════════════════
// DONNÉES CLINIQUES
// ══════════════════════════════════
const META = {
    rouge: { peur: "la peur de la maladie et de l'ins\u00e9curit\u00e9 corporelle", force: "Une pr\u00e9sence incarn\u00e9e, capable de s'ancrer dans l'instant sans \u00eatre happ\u00e9e par l'inqui\u00e9tude." },
    orange: { peur: "la peur de ressentir des \u00e9motions douloureuses", force: "Une intelligence \u00e9motionnelle profonde, qui transforme la sensibilit\u00e9 en boussole plut\u00f4t qu'en menace." },
    jaune: { peur: "la peur de l'inconnu et de l'incertitude", force: "Une confiance in\u00e9branlable, capable d'agir sans avoir besoin de tout pr\u00e9voir." },
    vert: { peur: "la peur du rejet et de l'abandon", force: "Un amour authentique, libre et g\u00e9n\u00e9reux, qui n'a plus besoin de se sacrifier pour exister." },
    bleu: { peur: "la peur de perdre le contr\u00f4le", force: "Une autorit\u00e9 naturelle, une parole juste qui inspire sans \u00e9craser." },
    indigo: { peur: "la peur du jugement et de ne pas \u00eatre \u00e0 la hauteur", force: "Une vision claire et intuitive, qui apprend de chaque exp\u00e9rience sans se punir." },
    violet: { peur: "la peur de ne pas savoir qui l'on est vraiment", force: "Une paix profonde, une authenticit\u00e9 qui rayonne sans avoir besoin de r\u00f4le." }
};

const MIRROR = {
    rouge: "Avant m\u00eame de poser le pied hors du lit, vous \u00e9coutez votre corps. Une tension dans la poitrine, un battement un peu plus rapide \u2014 et votre esprit part en qu\u00eate d'une explication. Non par hypochondrie, mais parce que votre syst\u00e8me nerveux a appris qu'ignorer un signal pouvait \u00eatre dangereux.",
    orange: "Quand on vous demande comment vous allez vraiment, vous r\u00e9pondez \u00ab\u00a0\u00e7a va\u00a0\u00bb sans y penser. Parce que nommer ce qui se passe \u00e0 l'int\u00e9rieur, ce serait ouvrir une porte que vous avez appris \u00e0 garder ferm\u00e9e. Ressentir a eu un prix \u2014 alors vous avez mis les \u00e9motions \u00e0 distance.",
    jaune: "Vous avez d\u00e9j\u00e0 trois plans pour une situation qui n'est pas encore arriv\u00e9e. Vous v\u00e9rifiez les horaires, les issues, les alternatives. Pas par plaisir \u2014 par n\u00e9cessit\u00e9 int\u00e9rieure. Votre esprit ne supporte pas le vide laiss\u00e9 par l'incertitude, alors il le remplit de pr\u00e9visions.",
    vert: "Vous sentez le moindre changement de ton chez l'autre. Vous adaptez votre r\u00e9ponse, votre posture, parfois votre opinion \u2014 pour maintenir l'harmonie. Non par faiblesse, mais parce que votre cerveau a enregistr\u00e9 que perdre le lien \u00e9tait une menace bien plus grande que de perdre un argument.",
    bleu: "D\u00e9l\u00e9guer vous demande plus d'\u00e9nergie que de faire vous-m\u00eame. Vous repassez derri\u00e8re, v\u00e9rifiez, corrigez. Pas par arrogance \u2014 par impossibilit\u00e9 de l\u00e2cher prise sans angoisse. Vous avez appris que tenir les r\u00eanes \u00e9tait la seule fa\u00e7on de ne pas vous effondrer.",
    indigo: "Vous relisez un email d\u00e9j\u00e0 envoy\u00e9. Vous retravaillez un dossier d\u00e9j\u00e0 valid\u00e9. Vous cherchez la faille \u2014 parce que si quelqu'un la trouve avant vous, cela confirmera ce que vous craignez secr\u00e8tement\u00a0: que vous n'\u00eates pas vraiment \u00e0 la hauteur.",
    violet: "Vous passez d'un r\u00f4le \u00e0 l'autre avec une fluidit\u00e9 d\u00e9concertante \u2014 professionnel\u00b7le, parent, ami\u00b7e, amant\u00b7e. Mais dans le silence, une question revient\u00a0: qui \u00eates-vous quand personne ne regarde\u00a0? Vous avez tellement bien appris \u00e0 vous adapter que vous ne savez plus o\u00f9 se trouve votre centre."
};


const LOOPS = {
    rouge: [
        "Un symptôme banal — une douleur légère, un battement de cœur un peu plus fort.",
        "Immédiatement, quelque chose en vous s'active. Vous devez savoir ce que c'est.",
        "Vous consultez, vérifiez, cherchez jusqu'à être rassuré·e. L'apaisement arrive — mais ne dure pas.",
        "Dès que la prochaine sensation apparaît, le cycle repart. C'est un réflexe de protection, pas un défaut de caractère."
    ],
    orange: [
        "Quelqu'un vous blesse, ou vous traversez un moment fort.",
        "Avant même que vous puissiez ressentir, quelque chose ferme l'accès automatiquement.",
        "Vous continuez, vous gérez — mais à l'intérieur, c'est comme regarder la scène derrière une vitre.",
        "Ce que vous n'avez pas pu traverser reste là, et ressort ailleurs, longtemps après. C'est une protection automatique, pas un manque de sensibilité."
    ],
    jaune: [

// LECTURE SCORES (URL → localStorage → démo)
// ══════════════════════════════════
function readScores() {
    const p = new URLSearchParams(location.search);
    let scores = null;
    const urlS = {};
    MASKS.forEach(m => { if (p.has(m)) urlS[m] = Math.min(100, Math.max(0, parseInt(p.get(m)) || 0)); });
    if (p.has('spa')) urlS.spa = Math.min(100, Math.max(0, parseInt(p.get('spa')) || 0));
    if (Object.keys(urlS).filter(k => MASKS.includes(k)).length >= 7) scores = urlS;
    if (!scores) {
        try { const ls = JSON.parse(localStorage.getItem('valeur_scores') || '{}'); if (ls && ls.rouge !== undefined) scores = ls; } catch(e) {}
    }
    if (!scores || Object.keys(scores).filter(k => MASKS.includes(k)).length < 7) {
        scores = { rouge:44, orange:38, jaune:73, vert:56, bleu:69, indigo:79, violet:32, spa:61 };
    }
    scores.prenom = p.get('prenom') || localStorage.getItem('valeur_prenom') || scores.prenom || '';
    scores.email  = p.get('email')  || localStorage.getItem('valeur_email')  || scores.email  || '';
    scores.pid    = p.get('pid')    || scores.pid || '';
    return scores;
}

// ── Score de Présence Authentique ─────────────────────────────────────────
// 7 items SPA (positions 11,22,33,44,55,66,77) · SPA_MAX = 35
function computeSPA(scores) {
    const raw = scores.spa_raw !== undefined ? scores.spa_raw : null;
    if (raw !== null) return Math.round((raw / 35) * 100);
    // Fallback : estimation depuis l'absence de scores masques
    const maskSum = ['rouge','orange','jaune','vert','bleu','indigo','violet']
        .reduce(function(acc, m) { return acc + (scores[m] || 0); }, 0);
    const avg = maskSum / 7;
    return Math.max(0, Math.min(100, Math.round(100 - avg)));
}

// ══════════════════════════════════════════════════════════════════════
// DÉTECTION PROFIL — Référence psychométrique V.A.L.E.U.R© Mai 2026
// Kessler et al. 2012 · Ben-Porath & Tellegen 2003 · SEM 7.7–10%
// Ordre obligatoire : 0-Adaptatif 1-Pan 2-Triade 3-Dyade 4-Mono 5-Résiduel
// ══════════════════════════════════════════════════════════════════════
function detectValidProfile(scores) {
    const VALID_DYADS = Object.keys(DYADES_AMPLIFICATIONS).map(k => k.split('+').sort());

    // Tri tiebreak transdiagnostique : Jaune > Rouge > Indigo > Vert > Bleu > Orange > Violet
    const sorted = MASKS.map(m => ({ key: m, pct: scores[m] || 0 }))
        .sort((a, b) => b.pct - a.pct || TIEBREAK.indexOf(a.key) - TIEBREAK.indexOf(b.key));

    const S1 = sorted[0].pct;
    const S2 = sorted[1] ? sorted[1].pct : 0;
    const S3 = sorted[2] ? sorted[2].pct : 0;
    const S4 = sorted[3] ? sorted[3].pct : 0;

    // ── 0. ADAPTATIF ──────────────────────────────────────────────────────
    if (S1 < 50) {
        const sub = S1 < 30 ? 'eq' : 'vig';
        return { type: 'adaptatif_' + sub, masks: sorted.map(m => m.key), primary: sorted[0].key };
    }

    // ── 1. PAN-MASQUES ────────────────────────────────────────────────────
    const active60 = sorted.filter(m => m.pct >= 60);
    if (active60.length >= 5) {
        const spread = Math.max(...active60.map(m => m.pct)) - Math.min(...active60.map(m => m.pct));
        if (spread <= 20) {
            return { type: 'pan', masks: active60.map(m => m.key), primary: sorted[0].key };
        }
    }

    // ── 2. TRIADE ─────────────────────────────────────────────────────────
    // S1 ≥ 60%, S2 ≥ 55%, S3 ≥ 55%, Δ(S1-S3) ≤ 15%, Δ(S2-S4) > 10%
    if (S1 >= 60 && S2 >= 55 && S3 >= 55 && (S1 - S3) <= 15 && (S2 - S4) > 5) {
        const keys = [sorted[0].key, sorted[1].key, sorted[2].key];
        return {
            type: 'triade',
            masks: keys,
            primary: keys[0], secondary: keys[1], tertiary: keys[2],
            data: TRIADES_AMPLIFICATIONS[keys.slice().sort().join('+')] || null
        };
    }

    // ── 3. DYADE ──────────────────────────────────────────────────────────
    // Tester S1+S2 uniquement (codetype primaire = paire des deux scores les plus élevés)
    const ps = [sorted[0].key, sorted[1].key].sort();
    const dKey = ps.join('+');
    const dyadeDoc = VALID_DYADS.some(d => d.join(',') === ps.join(','));
    if (dyadeDoc && S1 >= 55 && S2 >= 55 && (S1 - S2) <= 10) {
        const forte = S1 >= 65 && S2 >= 65;
        return {
            type: forte ? 'dyade' : 'dyade_moderee',
            masks: ps, primary: sorted[0].key, secondary: sorted[1].key,
            forte, data: DYADES_AMPLIFICATIONS[dKey] || null
        };
    }

    // ── 4. MONO ───────────────────────────────────────────────────────────
    if (S1 >= 75 && (S1 - S2) > 10) {
        return { type: 'mono', masks: [sorted[0].key], primary: sorted[0].key,
                 secondary: S2 >= 60 ? sorted[1].key : null };
    }
    if (S1 >= 60 && (S1 - S2) > 10) {
        return { type: 'mono_fort', masks: [sorted[0].key], primary: sorted[0].key };
    }

    // ── 5. RÉSIDUEL ───────────────────────────────────────────────────────
    return { type: 'residuel', masks: [sorted[0].key], primary: sorted[0].key };
}


// ── Enrichissement profil : sévérité, flags, ordre clinique ───────────────
function enrichProfile(profile, scores) {
    // Masques cliniquement significatifs selon seuils spécifiques
    const significants = MASKS.filter(m => (scores[m]||0) >= MASK_THRESHOLDS[m]);

    // Flag Orange bloqueur
    profile.orangeBlocker = (scores.orange||0) >= 60;

    // Flag Jaune amplificateur
    profile.jauneAmplifier = (scores.jaune||0) >= 70 && significants.length > 1;

    // Type dyade
    if (profile.type === 'dyade' || profile.type === 'dyade_moderee') {
        const dk = profile.masks.slice().sort().join('+');
        profile.dyadeType = DYADE_TYPES[dk] || 'congruente';
    }

    // Sévérité systémique
    if (profile.type === 'triade' || significants.length >= 3) {
        profile.severity = 'elevee';
    } else if (profile.type === 'dyade' || profile.type === 'dyade_moderee') {
        profile.severity = profile.dyadeType === 'paradoxale' ? 'importante' : 'moderee';
    } else {
        profile.severity = 'legere';
    }

    // Ordre clinique des masques actifs
    // 1. Orange en premier si bloqueur, 2. Jaune si amplificateur, 3. reste par score
    const coreMasks = profile.type === 'triade'
        ? [profile.primary, profile.secondary, profile.tertiary].filter(Boolean)
        : (profile.masks || [profile.primary]);

    const ordered = [];
    if (profile.orangeBlocker && !ordered.includes('orange')) ordered.push('orange');
    if (profile.jauneAmplifier && !ordered.includes('jaune')) ordered.push('jaune');
    coreMasks.forEach(function(m){ if (!ordered.includes(m)) ordered.push(m); });

    // Masques significatifs hors profil primaire (bloqueurs/amplificateurs additionnels)
    significants.forEach(function(m){
        if (!ordered.includes(m)) ordered.push(m);
    });

    profile.clinicalOrder = ordered;
    return profile;
}

function buildMaskPortrait(m, scores, isMain) {
    const meta = META[m], color = MASK_COLORS[m];
    const steps = LOOPS[m] || [];
    let h = '';
    if (isMain) {
        h += `<div class="hero-mask" style="background:${MASK_PASTELS[m]};border:1.5px solid ${color}30;">
            <span style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:${color};font-weight:600;">Votre protection</span>
            <div class="hero-mask-name">Masque ${MASK_LABELS[m]}</div>
            
            <p class="hero-tagline">${meta.peur ? 'Une peur centrale : ' + meta.peur + '.' : ''}</p>
        </div>`;
    }
    // Ouverture
    h += `<div class="block${isMain ? '' : ' compact-block'}">
        <h2 style="color:${color};">Ce que le test a reconnu</h2>
        <p style="font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:16px;">
            Ce n\u2019est pas vous. C\u2019est ce que la peur a construit pour vous prot\u00e9ger \u2014
            non une identit\u00e9, une strat\u00e9gie. Construite \u00e0 une \u00e9poque o\u00f9 vous n\u2019aviez pas d\u2019autre choix.
            Elle a rempli son r\u00f4le. Et vous pouvez maintenant en choisir un autre.
        </p>
        <div class="mirror-phrase" style="border-left-color:${color};">${MIRROR[m] || ''}</div>
    </div>`;
    // Pensées

        h += `<div class="block${isMain ? '' : ' compact-block'}">

}


// ── Section Priorités de travail V.A.L.E.U.R© ─────────────────────────────
function buildPrioritySection(profile, scores) {

    // Barre de sévérité visuelle
    const bars = [1,2,3,4].map(function(i) {
        const active = i <= sev.bar;
        return `<div style="width:28px;height:7px;border-radius:3px;background:${active ? sev.color : 'rgba(0,0,0,.1)'};-webkit-print-color-adjust:exact;print-color-adjust:exact;"></div>`;

    let h = `<div class="block page-break-before" style="border-top:3px solid ${sev.color}40;">

        </p>

        <!-- Sévérité -->
        <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(0,0,0,.03);border-radius:6px;margin-bottom:20px;">
            <div>
                <div style="font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;">Intensit\u00e9 syst\u00e9mique</div>
                <div style="display:flex;gap:5px;align-items:center;">
                    ${bars}

                ${sev.desc}
            </div>
        </div>`;

    // Type de dyade si applicable
    if (dyadeType) {
        const dtColor = profile.dyadeType === 'paradoxale' ? '#C4581F' : '#2D7A4F';
        h += `<div style="padding:12px 16px;border-left:3px solid ${dtColor};background:${dtColor}0A;border-radius:0 6px 6px 0;margin-bottom:20px;">
            <div style="font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:${dtColor};margin-bottom:4px;">${dyadeType.label}</div>
            <p style="font-size:13px;color:var(--text2);margin:0;line-height:1.65;">${dyadeType.desc}</p>
        </div>`;
    }

    // Ordre de traversée
    h += `<div style="font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;">Ordre de travers\u00e9e recommand\u00e9</div>`;

    order.forEach(function(m, idx) {
        const color = MASK_COLORS[m];
        const pct   = scores[m] || 0;
        const role  = MASK_ROLE[m];
        if (!role) return;

        // Badge spécial pour Orange et Jaune
        let badge = '';
        if (m === 'orange' && profile.orangeBlocker) {
            badge = `<span style="background:#B5312A10;color:#B5312A;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.06em;">BLOQUEUR</span>`;
        } else if (m === 'jaune' && profile.jauneAmplifier) {
            badge = `<span style="background:#B8930A10;color:#B8930A;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.06em;">AMPLIFICATEUR</span>`;
        }

        h += `<div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;padding-bottom:18px;${idx < order.length-1 ? 'border-bottom:1px solid rgba(0,0,0,.06);' : ''}">
            <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:38px;">

                ${idx < order.length-1 ? `<div style="width:1px;height:24px;background:rgba(0,0,0,.1);"></div>` : ''}
            </div>
            <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                    <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:${color};">Masque ${MASK_LABELS[m]}</span>

        </p>

    h += `</div>`;
    return h;
}

    const color1 = MASK_COLORS[m1], color2 = MASK_COLORS[m2];
    let h = `<div class="block page-break-before" style="border-top:2px solid var(--gold)30;">
        <p class="eyebrow">Ce qui se passe quand les deux s\u2019activent ensemble</p>

            <div style="display:flex;align-items:center;gap:8px;">
                
                <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;">Masque ${MASK_LABELS[m1]}</span>
            </div>
            <span style="color:var(--text3);font-size:16px;">+</span>
            <div style="display:flex;align-items:center;gap:8px;">
                
                <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;">Masque ${MASK_LABELS[m2]}</span>
            </div>
        </div>
        `;
    const dKey2 = [m1,m2].sort().join('+');
    const dyPsycho = DYADE_PSYCHO[dKey2];

    const dtColor  = dyType === 'paradoxale' ? '#C4581F' : '#2D7A4F';

    if (data && data.desc) {
        h += `<p style="color:var(--text2);line-height:1.8;margin-bottom:14px;">${data.desc}</p>`;
    }
    if (dyPsycho) {
        h += `<div style="padding:14px 16px;border-left:3px solid ${dtColor};background:${dtColor}0D;border-radius:0 6px 6px 0;margin-bottom:16px;">
            <div style="font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:${dtColor};margin-bottom:6px;">${dtLabel}</div>
            <p style="font-size:14px;color:var(--text2);margin:0;line-height:1.75;">${dyPsycho}</p>

    if (data && data.boucle && data.boucle.length) {
        h += `<div class="mechanism" style="margin-top:16px;">${data.boucle.map((s,i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}</div>`;

    }
    h += `</div>`;
    return h;
}

// ── Scores + SPA ──────────────────────────────────────────────────────────
function buildScoresSPA(scores, spa) {
    const spaText = spa >= 70 ? "Vous avez d\u00e9j\u00e0 de larges espaces o\u00f9 vous agissez depuis vous-m\u00eame \u2014 non depuis la peur."
        : spa >= 50 ? "Environ une r\u00e9ponse sur deux vient de votre propre centre. Cet espace peut grandir."
        : spa >= 30 ? "La protection guide beaucoup de vos r\u00e9actions. Ce n\u2019est pas un verdict \u2014 c\u2019est une information pr\u00e9cise."
        : "Votre protection est tr\u00e8s active. Ce score dit surtout qu\u2019elle a d\u00fb travailler \u00e9norm\u00e9ment. \u00c7a m\u00e9rite du respect.";
    let h = `<div class="block page-break-before">
        <h2>L\u2019intensit\u00e9 de vos protections</h2>
        <p style="color:var(--text2);margin-bottom:20px;">Voici la carte compl\u00e8te de vos d\u00e9fenses actuelles. Chaque score est une information, pas un verdict.</p>`;
    const sortedM = [...MASKS].sort((a,b) => (scores[b]||0)-(scores[a]||0));
    sortedM.forEach(m => {
        const pct = scores[m]||0, color = MASK_COLORS[m];
        const lv = pct>=85?'Dominant':pct>=70?'\u00c9lev\u00e9':pct>=50?'Significatif':pct>=30?'Mod\u00e9r\u00e9':'Faible';
        h += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            
            <span style="font-size:14px;font-weight:500;width:68px;">${MASK_LABELS[m]}</span>
            <div style="flex:1;height:6px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden;">
                <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width .6s ease;-webkit-print-color-adjust:exact;print-color-adjust:exact;"></div>
            </div>
            <span style="font-size:14px;font-weight:500;width:34px;text-align:right;">${pct}%</span>
            <span style="font-size:11px;width:76px;text-align:right;color:var(--text3);">${lv}</span>
        </div>`;
    });
    h += `<div style="margin-top:24px;border-top:1px solid var(--line);padding-top:18px;">
        <p style="font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;">Pr\u00e9sence authentique</p>
        <p style="font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--text2);margin-bottom:16px;">La part de vos r\u00e9ponses qui vient de vous-m\u00eame \u2014 non de vos peurs ou de vos d\u00e9fenses.</p>
        <div style="display:flex;align-items:center;gap:20px;">
            <div class="spa-ring" style="width:70px;height:70px;flex-shrink:0;">
                <svg width="70" height="70" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#E5E0D8" stroke-width="6"/><circle cx="50" cy="50" r="42" fill="none" stroke="#C9A84C" stroke-width="6" stroke-dasharray="264" stroke-dashoffset="${264*(1-spa/100)}" stroke-linecap="round"/></svg>
                <div class="spa-value" style="font-size:20px;">${spa}%</div>
            </div>
            <div><p style="font-weight:600;margin-bottom:4px;">Pr\u00e9sence authentique \u2014 ${spa}%</p><p style="color:var(--text3);font-size:14px;line-height:1.65;">${spaText}</p></div>
        </div>
    </div>`;
    h += `<p style="margin-top:24px;text-align:center;" class="no-print"><button class="btn-print" onclick="window.print()">Enregistrer en PDF</button></p>`;
    h += `</div>`;
    return h;
}

    </div>`;
}

// ── Portrait principal ─────────────────────────────────────────────────────
function buildPortrait(scores, profile, prenom) {
    const dom = profile.primary;
    const spa = computeSPA(scores);
    let html  = '';

    // Couverture
    html += buildCoverPage(profile, scores, prenom);

    // ── PRIORITÉS
    html += buildPrioritySection(profile, scores);

    // ── TRIADE ────────────────────────────────────────────────────────────
    if (profile.type === 'triade') {
        const m1 = profile.primary, m2 = profile.secondary, m3 = profile.tertiary;
        html += `<div class="block intro-dyade" style="border-top:3px solid rgba(201,168,76,.3);">
            <p style="color:var(--text2);font-size:15px;line-height:1.8;">
                Trois protections co-actives ont \u00e9t\u00e9 identifi\u00e9es. Elles forment un syst\u00e8me o\u00f9 chacune renforce les autres \u2014
                ce qui explique pourquoi ce circuit est particulièrement ancr\u00e9.
            </p>
        </div>`;
        [{ m: m1, lbl: 'Premi\u00e8re protection' },
         { m: m2, lbl: 'Deuxi\u00e8me protection' },
         { m: m3, lbl: 'Troisi\u00e8me protection' }].forEach(function(s) {
            html += `<div class="mask-section" style="border-left:4px solid ${MASK_COLORS[s.m]}20;">
                <div class="mask-section-label" style="background:${MASK_COLORS[s.m]};color:#fff;">${s.lbl} \u00b7 Masque ${MASK_LABELS[s.m]}</div>`;
            html += buildMaskPortrait(s.m, scores, false);
            html += '</div>';
        });
        html += buildTriadeReveal(profile);
        html += buildReframe(m1);
    }

    // ── DYADE ─────────────────────────────────────────────────────────────
    else if (profile.type === 'dyade' || profile.type === 'dyade_moderee') {
        const m1 = profile.primary, m2 = profile.secondary;
        html += `<div class="block intro-dyade" style="border-top:3px solid rgba(201,168,76,.3);">
            <p style="color:var(--text2);font-size:15px;line-height:1.8;">
                Ces deux protections se renforcent mutuellement \u2014 formant un circuit plus puissant que chacune ne le serait seule.
            </p>
        </div>`;
        [{ m: m1, lbl: 'Premi\u00e8re protection' },
         { m: m2, lbl: 'Deuxi\u00e8me protection' }].forEach(function(s) {
            html += `<div class="mask-section" style="border-left:4px solid ${MASK_COLORS[s.m]}20;">
                <div class="mask-section-label" style="background:${MASK_COLORS[s.m]};color:#fff;">${s.lbl} \u00b7 Masque ${MASK_LABELS[s.m]}</div>`;
            html += buildMaskPortrait(s.m, scores, false);
            html += '</div>';
        });
        html += buildDyadeReveal(profile);
        html += buildReframe(m1);
    }

    // ── MONO ──────────────────────────────────────────────────────────────
    else if (profile.type === 'mono' || profile.type === 'mono_fort' || profile.type === 'residuel') {
        html += buildMaskPortrait(dom, scores, true);
        html += buildReframe(dom);
    }

    // ── PAN-MASQUES ───────────────────────────────────────────────────────
    else if (profile.type === 'pan') {
        html += `<div class="block">
            <p style="color:var(--text2);line-height:1.8;">${PAN_MASQUE.desc}</p>
        </div>`;
        profile.masks.forEach(function(m) {
            html += `<div class="mask-section" style="border-left:4px solid ${MASK_COLORS[m]}20;">
                <div class="mask-section-label" style="background:${MASK_COLORS[m]};color:#fff;">Masque ${MASK_LABELS[m]}</div>`;
            html += buildMaskPortrait(m, scores, false);
            html += '</div>';
        });
        html += buildReframe(dom);
    }

    // ── ADAPTATIF ─────────────────────────────────────────────────────────
    else if (profile.type.startsWith('adaptatif')) {
        html += `<div class="block">
            <h2>Profil adaptatif</h2>
            <p style="color:var(--text2);">${ADAPTATIF.desc}</p>
        </div>`;
    }

    // ── SCORES + SPA ──────────────────────────────────────────────────────
    html += buildScoresSPA(scores, spa);

    // ── MÉTHODE V.A.L.E.U.R© ─────────────────────────────────────────────
    html += buildValeurSection();

    // ── PIED DE PAGE ──────────────────────────────────────────────────────
    html += `<div class="rapport-footer print-only">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);border-top:1px solid var(--line);padding-top:10px;">
            <span>V.A.L.E.U.R\u00a9 \u00b7 Rapport Personnel \u00b7 Confidentiel</span>
            <span>C\u00e9line Bourbon \u00b7 Psychologue \u00b7 \u00a9 2026</span>
        </div>
    </div>`;

    return html;
}


function getLevelLabel(pct) {
    if (pct >= 85) return 'Dominant';
    if (pct >= 70) return '\u00c9lev\u00e9';
    if (pct >= 50) return 'Significatif';
    if (pct >= 30) return 'Mod\u00e9r\u00e9';
    return 'Non significatif';
}

async function saveNeon() {
    if (!SC.pid) return;
    try {
        await fetch(VERCEL_API + '/save-portrait', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pid: SC.pid, email: SC.email, prenom: SC.prenom, scores: SC, profil: PROF.type, masque: PROF.primary, spa: SC.spa })
        });
    } catch(e) {}
}

}
