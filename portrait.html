    // ═══════════════ DÉTECTION DU PROFIL ═══════════════
    function detectProfile(scores) {
        const sorted = MASKS.map(k => ({ key: k, pct: scores[k] || 0 })).sort((a, b) => b.pct - a.pct);
        const top = sorted[0].pct;
        const tied = sorted.filter(m => m.pct === top);
        if (tied.length >= 2) sorted.sort((a, b) => b.pct - a.pct || TIEBREAK.indexOf(a.key) - TIEBREAK.indexOf(b.key));
        const S1 = sorted[0].pct, S2 = sorted[1]?.pct || 0, S3 = sorted[2]?.pct || 0, S4 = sorted[3]?.pct || 0;
        const primary = sorted[0].key, secondary = sorted[1]?.key || null;
        const masks = sorted.map(m => m.key);
        if (S1 < 50) return { type: S1 < 30 ? 'adaptatif_eq' : 'adaptatif_vig', masks, primary };
        const active60 = sorted.filter(m => m.pct >= 60);
        if (active60.length >= 5) {
            const spread = Math.max(...active60.map(m => m.pct)) - Math.min(...active60.map(m => m.pct));
            if (spread <= 20) return { type: 'pan', masks: active60.map(m => m.key), primary };
        }
        if (S1 >= 60 && S2 >= 55 && S3 >= 55 && (S1 - S3) <= 15 && (S2 - S4) > 10) return { type: 'triade', masks: [sorted[0].key, sorted[1].key, sorted[2].key], primary, secondary: sorted[1].key, tertiary: sorted[2].key };
        if (S1 >= 65 && S2 >= 65 && S3 < 55 && (S1 - S2) <= 10) return { type: 'dyade', masks: [sorted[0].key, sorted[1].key], primary, secondary };
        if (S1 >= 55 && S2 >= 55 && S3 < 50 && (S1 - S2) <= 10) return { type: 'dyade_moderee', masks: [sorted[0].key, sorted[1].key], primary, secondary };
        if (S1 >= 75 && (S1 - S2) > 10) return { type: 'mono', masks: [primary], primary, secondary: (S2 >= 60) ? secondary : null };
        if (S1 >= 60 && (S1 - S2) > 10) return { type: 'mono_fort', masks: [primary], primary };
        return { type: 'residuel', masks: [primary], primary };
    }

    function computeSPA(scores) {
        if (scores.spa !== undefined && scores.spa !== null) return parseInt(scores.spa);
        const sum = MASKS.reduce((s, m) => s + (scores[m] || 0), 0);
        return Math.round(100 - sum / 7);
    }

            desc: "Votre masque Rouge surveille votre corps, votre masque Jaune exige des certitudes. Chaque sensation devient une question médicale qui doit avoir une réponse — et la réponse n'est jamais assez rassurante.",
            boucle: [
                "Une sensation corporelle apparaît (Rouge)",
                "Jaune exige une certitude que la médecine ne peut pas donner",
                "Vous cherchez des informations, consultez, vérifiez",
                "La rassurance ne dure pas → la prochaine sensation relance le cycle"
            ]
        }
    };

    const TRIADES_AMPLIFICATIONS = {
        "indigo+jaune+bleu": {
            nom: "Triple verrouillage",
            desc: "Votre masque Indigo exige la perfection, votre masque Jaune refuse l'incertitude, votre masque Bleu a besoin de tout contrôler. Ensemble, ces trois protections forment une prison d'exigence : rien ne doit dévier, rien ne doit être imparfait, rien ne peut être laissé au hasard.",
            boucle: [
                "Vous devez réussir (Indigo) → vous planifiez tout (Jaune) → vous contrôlez chaque détail (Bleu)",
                "Quelque chose est imparfait → vous recommencez",
                "L'épuisement vous gagne → vous ne pouvez pas vous arrêter",
                "Les trois masques s'activent simultanément à chaque nouveau projet"
            ]
        },
        "vert+indigo+orange": {
            nom: "Effacement silencieux",
            desc: "Votre masque Vert vous adapte aux autres, votre masque Indigo vous impose des standards, votre masque Orange coupe l'accès à vos émotions. Vous disparaissez derrière ce que vous faites pour les autres, sans même savoir ce que vous ressentez.",
            boucle: [
                "On attend quelque chose de vous → Vert s'adapte",
                "Indigo exige que ce soit parfait",
                "Orange empêche de ressentir la fatigue ou la frustration",
                "Vous donnez sans compter → vous ne savez plus ce dont vous avez besoin"
            ]
        }
    };

    // ═══════════════ CONSTRUCTION DU PORTRAIT (ENRICHI) ═══════════════
    function buildPortrait(scores, profile, prenom) {
        const dom = profile.primary, sec = profile.secondary;
        const meta = META[dom];
        const spa = computeSPA(scores);
        let html = '';
        const maskLabel = MASK_LABELS[dom];

        // ═══ HERO — LE MASQUE DOMINANT ═══
        html += `<div class="hero-mask" style="border-color: ${MASK_COLORS[dom]}40;">
            <span style="font-size:13px; letter-spacing:3px; text-transform:uppercase; color:${MASK_COLORS[dom]}; font-weight:500;">Votre protection principale</span>
            <div class="hero-mask-name">Masque ${maskLabel}</div>
            <div class="hero-separator"></div>
            <p class="hero-tagline">
                C’est le masque qui s’active le plus automatiquement en vous. Il colore vos réactions, oriente vos décisions, et influence la manière dont vos autres défenses se manifestent.
            </p>
            <p style="color:var(--text3); font-size:14px; margin-top:16px;">
                ${profile.type === 'mono' || profile.type === 'mono_fort'
                    ? 'Il agit souvent seul, concentrant l’essentiel de votre énergie défensive.'
                    : `Il dialogue avec d’autres masques — nous vous montrons plus bas comment ils se répondent.`}
            </p>
        </div>`;

        // ═══ RAPPEL ═══
        html += `<div class="reminder-box" style="margin-bottom:32px;">
            <strong>Rappelez-vous :</strong> Vous n’êtes pas ce masque. Il est une protection, non une identité.<br>
            Cette stratégie n’est pas votre personnalité — elle est ce qui la recouvre.
        </div>`;

        // ═══ BLOC 1 — "C'est exactement ça" ═══
        html += `<div class="block">
            <h2>1. C'est exactement ça</h2>
            <div class="mirror-phrase">${MIRROR[dom] || ''}</div>
            <p style="color: var(--text2); font-size:14px; margin-top:12px;">
                Cette réaction n'est pas un défaut de caractère. Votre esprit a résolu un problème. Le problème a changé, mais la solution est restée. Ce n'est pas vous qui dysfonctionnez — c'est une protection qui continue de tourner alors que le danger est passé.
            </p>
        </div>`;

        // ═══ BLOC 2 — "Je comprends pourquoi" ═══
        const steps = LOOPS[dom] || [];
        html += `<div class="block">
            <h2>2. Je comprends pourquoi</h2>
            <p style="margin-bottom:16px; color:var(--text2);">Voici la boucle qui se répète, souvent sans que vous en ayez conscience :</p>
            <div class="mechanism">
                ${steps.map((step, i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${step}</div></div>`).join('')}
            </div>
            <div class="metaphor-box">
                Imaginez un détecteur de fumée réglé trop sensiblement. Il protège la maison. Mais il sonne aussi quand les toasts brûlent. Votre masque fonctionne comme cela : il ne sait pas encore que la guerre est finie.
            </div>
        </div>`;

        // ═══ BLOC 2bis — "Quand les masques se répondent" (dyade/triade/pan) ═══
        if (profile.type === 'dyade' || profile.type === 'dyade_moderee' || profile.type === 'triade' || profile.type === 'pan') {
            const sortedKeys = [...profile.masks].sort();
            const key = sortedKeys.join('+');
            const amplification = (profile.type === 'triade' ? TRIADES_AMPLIFICATIONS[key] : null) || DYADES_AMPLIFICATIONS[key] || null;

            html += `<div class="block" style="border-left: 3px solid ${MASK_COLORS[dom]};">
                <h2>2bis. Quand les masques se répondent</h2>
                <p style="color:var(--text2);">Votre configuration n'est pas une simple addition de peurs. Les masques interagissent, s'amplifient, et créent ensemble des schémas plus complexes que chacun ne le ferait seul.</p>
                <div style="display:flex; gap:10px; margin:16px 0; flex-wrap:wrap;">
                    ${profile.masks.slice(0, 3).map(m => `<span style="background:${MASK_COLORS[m]}; color:#fff; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:500;">${MASK_LABELS[m]}</span>`).join('')}
                </div>`;

            if (amplification) {
                html += `<p style="font-weight:600; color:var(--gold);">${amplification.nom}</p>`;
                html += `<p style="color:var(--text2);">${amplification.desc}</p>`;
                html += `<div class="mechanism" style="margin-top:16px;">`;
                amplification.boucle.forEach((step, i) => {
                    html += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${step}</div></div>`;
                });
                html += `</div>`;
            } else {
                html += `<p style="color:var(--text2); font-style:italic;">Vos masques forment une combinaison unique. Ensemble, ils créent un système de protection qui mérite d'être exploré avec un accompagnement personnalisé.</p>`;
            }
            html += `</div>`;
        }

        // ═══ BLOC 3 — "Ce n'est pas un défaut" ═══
        html += `<div class="block">
            <h2>3. Ce n'est pas un défaut</h2>
            <p style="color:var(--text2);">${ORIGINS[dom] || ''}</p>
            <p style="color:var(--text2); margin-top:12px;">
                Des millions de personnes vivent avec ce même mécanisme. Vous n'êtes pas cassé·e. Vous êtes simplement humain·e.
            </p>
            <div class="force-box">
                <p style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;">Derrière ce masque, il y a une force réelle :</p>
                <p style="font-weight:500;margin-top:8px;">${meta.force}</p>
            </div>
            <p style="color:var(--text2); margin-top:8px;">
                Cette force n'est pas une compensation. Elle est la preuve que, sous le masque, quelqu'un de réel attend d'exister sans avoir besoin de se défendre. Votre nature vraie n'a pas disparu — elle est recouverte, intacte, et attend d'être libérée.
            </p>
        </div>`;

        // ═══ BLOC 3bis — "Ce que le masque a retenu" ═══
        const experiences = RETAINED_EXPERIENCES[dom] || [];
        html += `<div class="block">
            <h2>3bis. Ce que ce masque a retenu en vous</h2>
            <p style="color:var(--text2); margin-bottom:16px;">
                Chaque fois que le masque s'est activé pour vous protéger, il a aussi retenu quelque chose. Un élan. Une parole. Une envie. Une direction. Ces forces n'ont pas disparu. Elles sont restées en attente, comme des graines sous la neige.
            </p>
            <ul style="list-style:none; padding:0;">
                ${experiences.map(exp => `<li style="padding:8px 0; border-bottom:1px solid var(--line); color:var(--text2); font-size:15px;">✦ ${exp}</li>`).join('')}
            </ul>
            <p style="color:var(--text2); margin-top:16px; font-style:italic;">
                Ces expériences ne sont pas perdues. Elles sont en attente. Et c'est précisément ce que la méthode V.A.L.E.U.R vous aide à retrouver.
            </p>
        </div>`;

        // ═══ BLOC 4 — Carte d'identité des masques + SPA ═══
        html += `<div class="block">
            <h2>4. Votre carte des masques</h2>
            <p style="color:var(--text2); margin-bottom:20px;">
                Voici la photographie complète de vos protections en ce moment. Chaque masque a un niveau d'emprise différent — cela n'a rien de définitif, c'est une base de départ pour mieux vous connaître.
            </p>`;
        const sortedMasks = [...MASKS].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
        sortedMasks.forEach(m => {
            const pct = scores[m] || 0;
            const level = getLevelLabel(pct);
            const color = MASK_COLORS[m];
            html += `
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
                <div style="width:9px; height:9px; border-radius:50%; background:${color}; flex-shrink:0;"></div>
                <span style="font-size:14px; font-weight:500; width:70px; color:var(--text);">${MASK_LABELS[m]}</span>
                <div style="flex:1; height:6px; background:rgba(0,0,0,0.06); border-radius:3px; overflow:hidden;">
                    <div style="width:${pct}%; height:100%; background:${color}; border-radius:3px;"></div>
                </div>
                <span style="font-size:14px; font-weight:500; width:36px; text-align:right; color:var(--text);">${pct}%</span>
                <span style="font-size:11px; width:80px; text-align:right; color:var(--text3);">${level}</span>
            </div>`;
        });
        html += `
            <div style="margin-top:28px; border-top:1px solid var(--line); padding-top:20px;">
                <div style="display:flex; align-items:center; gap:20px;">
                    <div class="spa-ring" style="width:70px; height:70px;">
                        <svg width="70" height="70" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#E5E0D8" stroke-width="6"/>
                            <circle cx="50" cy="50" r="42" fill="none" stroke="#C9A84C" stroke-width="6" stroke-dasharray="264" stroke-dashoffset="${264 * (1 - spa/100)}" stroke-linecap="round"/>
                        </svg>
                        <div class="spa-value" style="font-size:20px;">${spa}%</div>
                    </div>
                    <div>
                        <p style="font-weight:500;">Score de Présence Authentique</p>
                        <p style="color:var(--text3); font-size:14px;">
                            ${spa >= 70 ? 'Vous êtes déjà souvent vous‑même, même face aux défis.' : spa >= 40 ? 'Votre espace de liberté existe déjà. Il demande à s\'élargir.' : 'Votre masque occupe une grande place. C\'est un point de départ respectable.'}
                            Ce score mesure les moments où vous êtes déjà vous‑même, sans masque.
                        </p>
                    </div>
                </div>
            </div>
            <p style="margin-top:24px; text-align:center;">
                <button class="btn-print" onclick="window.print()">Imprimer / Télécharger en PDF</button>
            </p>
        </div>`;

        // ═══ BLOC 5 — La méthode V.A.L.E.U.R ═══
        html += `<div class="block">
            <h2>5. La méthode V.A.L.E.U.R</h2>
            <p style="color:var(--text2); margin-bottom:20px;">
                Derrière chaque lettre du mot <strong>V.A.L.E.U.R</strong> se cache une étape concrète pour traverser le masque et retrouver votre nature profonde.
            </p>
            <div style="display:flex; flex-direction:column; gap:14px;">
                ${VALEUR_STEPS.map(step => `
                    <div style="display:flex; align-items:flex-start; gap:14px;">
                        <div style="width:36px; height:36px; border-radius:50%; background:var(--gold); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:16px; flex-shrink:0;">${step.lettre}</div>
                        <div>
                            <div style="font-weight:600; color:var(--gold);">${step.nom}</div>
                            <div style="font-size:14px; color:var(--text3);">${step.desc}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
            <p style="margin-top:24px; color:var(--text2); font-size:14px; text-align:center; font-style:italic;">
                Ce chemin est celui que nous empruntons ensemble, pas à pas, pour que vous puissiez enfin être vous‑même — sans masque.
            </p>
        </div>`;

        return html;
    }

    function getLevelLabel(pct) {
        if (pct >= 85) return 'Dominant';
        if (pct >= 70) return 'Élevé';
        if (pct >= 50) return 'Significatif';
        if (pct >= 30) return 'Modéré';
        return 'Non significatif';
    }

    // ═══════════════ SAUVEGARDE GOOGLE SHEETS ═══════════════
    async function saveToGoogleSheet(email, prenom, scores, masque, profilType, spa) {
        try {
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email || '',
                    prenom: prenom || '',
                    scores: scores,
                    masque_dominant: masque,
                    profil_type: profilType,
                    spa: spa
                })
            });
        } catch (e) { console.warn('Sauvegarde silencieuse'); }
    }

    // ═══════════════ INITIALISATION ═══════════════
    async function init() {
        const params = new URLSearchParams(window.location.search);
        let scores = null;

        const urlScores = {};
        MASKS.forEach(m => {
            if (params.has(m)) urlScores[m] = parseInt(params.get(m)) || 0;
        });
        if (params.has('spa')) urlScores.spa = parseInt(params.get('spa')) || 0;
        if (Object.keys(urlScores).length >= 7) scores = urlScores;

        if (!scores) {
            try {
                const stored = localStorage.getItem('valeur_scores');
                if (stored) scores = JSON.parse(stored);
            } catch (e) {}
        }

        if (!scores || Object.keys(scores).filter(k => MASKS.includes(k)).length < 7) {
            scores = {
                rouge: 44, orange: 38, jaune: 73, vert: 56,
                bleu: 69, indigo: 79, violet: 32, spa: 61
            };
        }

        const prenom = params.get('prenom') || localStorage.getItem('valeur_prenom') || '';
        const email = params.get('email') || localStorage.getItem('valeur_email') || '';
        const profile = detectProfile(scores);
        const spa = computeSPA(scores);

        document.getElementById('portrait-content').innerHTML = buildPortrait(scores, profile, prenom);

        saveToGoogleSheet(email, prenom, scores, profile.primary, profile.type, spa);
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
