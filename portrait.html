<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>V.A.L.E.U.R© — Votre Portrait</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FCFAF7; --text: #2A2622; --text2: #4A4340; --text3: #8C827D;
            --gold: #C9A84C; --line: #E5E0D8; --card-bg: #F6F4F0;
            --rouge: #B5312A; --orange: #C4581F; --jaune: #B8930A;
            --vert: #2D7A4F; --bleu: #1D5F8A; --indigo: #5C3280; --violet: #7A3594;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; color: var(--text); }
        h1 { font-size: clamp(36px, 6vw, 56px); line-height: 1.1; margin-bottom: 8px; }
        h2 { font-size: 22px; margin-bottom: 16px; color: var(--gold); }
        .chroma-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--rouge), var(--orange), var(--jaune), var(--vert), var(--bleu), var(--indigo), var(--violet));
            margin-bottom: 48px;
        }
        .block {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px 28px;
            margin-bottom: 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }
        .mask-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 16px;
        }
        .mirror-phrase {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-style: italic;
            line-height: 1.5;
            color: var(--text);
            margin: 24px 0;
            padding-left: 16px;
            border-left: 3px solid var(--gold);
        }
        .reminder-box {
            background: #FFFDF7;
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            text-align: center;
        }
        .reminder-box strong {
            color: var(--gold);
            font-weight: 500;
        }
        .metaphor-box {
            background: #FFFDF7;
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin: 20px 0;
            font-size: 14px;
            color: var(--text2);
            font-style: italic;
        }
        .mechanism {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0;
        }
        .step {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gold);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        .step-text { font-size: 15px; line-height: 1.6; }
        .force-box {
            background: linear-gradient(135deg, #FCFAF7 0%, #F3F1EC 100%);
            border-left: 3px solid var(--gold);
            padding: 20px 24px;
            border-radius: 0 8px 8px 0;
            margin: 24px 0;
        }
        .spa-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 32px 0;
        }
        .spa-ring {
            position: relative;
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }
        .spa-ring svg { transform: rotate(-90deg); }
        .spa-value {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: var(--gold);
        }
        .hero-mask {
            text-align: center;
            padding: 48px 20px 40px;
            margin-bottom: 32px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(201,168,76,0.06) 100%);
            border: 1px solid rgba(201,168,76,0.15);
        }
        .hero-mask-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 8vw, 80px);
            font-weight: 300;
            line-height: 1;
            color: var(--text);
            margin-bottom: 12px;
        }
        .hero-separator {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto;
        }
        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-style: italic;
            color: var(--text2);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }
        .btn-print {
            display: inline-block;
            background: var(--gold);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            margin-top: 16px;
        }
        .btn-print:hover { opacity: 0.9; }
        .footer-note {
            text-align: center;
            color: var(--text3);
            font-size: 13px;
            margin-top: 48px;
            border-top: 1px solid var(--line);
            padding-top: 24px;
        }
        a { color: var(--gold); text-decoration: none; border-bottom: 1px solid transparent; transition: border .2s; }
        a:hover { border-bottom-color: var(--gold); }
        @media print {
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .block { box-shadow: none; background: white; border: 1px solid #ddd; }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="chroma-bar"></div>
    <div id="portrait-content"></div>
    <div class="footer-note">Méthode V.A.L.E.U.R© · Céline Bourbon, Psychologue · Cabinet</div>
</div>

<script>
    // ═══════════════ CONFIG ═══════════════
    const MASKS = ['rouge','orange','jaune','vert','bleu','indigo','violet'];
    const MASK_COLORS = {
        rouge: '#B5312A', orange: '#C4581F', jaune: '#B8930A',
        vert: '#2D7A4F', bleu: '#1D5F8A', indigo: '#5C3280', violet: '#7A3594'
    };
    const MASK_LABELS = {
        rouge: 'Rouge', orange: 'Orange', jaune: 'Jaune',
        vert: 'Vert', bleu: 'Bleu', indigo: 'Indigo', violet: 'Violet'
    };
    const TIEBREAK = ['jaune','rouge','indigo','vert','bleu','orange','violet'];
    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycby4vOwYjKBFhtLBmwaqvlK5ba8Ow3rzlXihaQBPyA0/exec';

    // ═══════════════ DONNÉES CLINIQUES (inchangées) ═══════════════
    const META = {
        rouge: { peur: "la peur de la maladie et de l'insécurité corporelle", force: "Une présence incarnée, capable de s'ancrer dans l'instant sans être happée par l'inquiétude." },
        orange: { peur: "la peur de ressentir des émotions douloureuses", force: "Une intelligence émotionnelle profonde, qui transforme la sensibilité en boussole plutôt qu'en menace." },
        jaune: { peur: "la peur de l'inconnu et de l'incertitude", force: "Une confiance inébranlable, capable d'agir sans avoir besoin de tout prévoir." },
        vert: { peur: "la peur du rejet et de l'abandon", force: "Un amour authentique, libre et généreux, qui n'a plus besoin de se sacrifier pour exister." },
        bleu: { peur: "la peur de perdre le contrôle", force: "Une autorité naturelle, une parole juste qui inspire sans écraser." },
        indigo: { peur: "la peur du jugement et de ne pas être à la hauteur", force: "Une vision claire et intuitive, qui apprend de chaque expérience sans se punir." },
        violet: { peur: "la peur de ne pas savoir qui l'on est vraiment", force: "Une paix profonde, une authenticité qui rayonne sans avoir besoin de rôle." }
    };

    const MIRROR = {
        rouge: "Avant même de poser le pied hors du lit, vous écoutez votre corps. Une tension dans la poitrine, un battement un peu plus rapide — et votre esprit part en quête d'une explication. Non par hypochondrie, mais parce que votre système nerveux a appris qu'ignorer un signal pouvait être dangereux.",
        orange: "Quand on vous demande comment vous allez vraiment, vous répondez « ça va » sans y penser. Parce que nommer ce qui se passe à l'intérieur, ce serait ouvrir une porte que vous avez appris à garder fermée. Ressentir a eu un prix — alors vous avez mis les émotions à distance.",
        jaune: "Vous avez déjà trois plans pour une situation qui n'est pas encore arrivée. Vous vérifiez les horaires, les issues, les alternatives. Pas par plaisir — par nécessité intérieure. Votre esprit ne supporte pas le vide laissé par l'incertitude, alors il le remplit de prévisions.",
        vert: "Vous sentez le moindre changement de ton chez l'autre. Vous adaptez votre réponse, votre posture, parfois votre opinion — pour maintenir l'harmonie. Non par faiblesse, mais parce que votre cerveau a enregistré que perdre le lien était une menace bien plus grande que de perdre un argument.",
        bleu: "Déléguer vous demande plus d'énergie que de faire vous-même. Vous repassez derrière, vérifiez, corrigez. Pas par arrogance — par impossibilité de lâcher prise sans angoisse. Vous avez appris que tenir les rênes était la seule façon de ne pas vous effondrer.",
        indigo: "Vous relisez un email déjà envoyé. Vous retravaillez un dossier déjà validé. Vous cherchez la faille — parce que si quelqu'un la trouve avant vous, cela confirmera ce que vous craignez secrètement : que vous n'êtes pas vraiment à la hauteur.",
        violet: "Vous passez d'un rôle à l'autre avec une fluidité déconcertante — professionnel·le, parent, ami·e, amant·e. Mais dans le silence, une question revient : qui êtes-vous quand personne ne regarde ? Vous avez tellement bien appris à vous adapter que vous ne savez plus où se trouve votre centre."
    };

    const LOOPS = {
        rouge: ["Une sensation corporelle émerge — un battement, une douleur, une gêne.","Votre esprit l'interprète immédiatement comme une menace potentielle.","Vous cherchez une confirmation, une réassurance — mais la certitude parfaite n'existe pas, et l'alerte repart."],
        orange: ["Une émotion douloureuse approche — tristesse, colère, peur.","Votre esprit verrouille l'accès pour ne pas être submergé.","L'émotion, non traversée, ressurgit ailleurs — fatigue, vide, irritabilité — sans que vous sachiez pourquoi."],
        jaune: ["Une situation comporte une part d'incertitude — même minime.","Votre esprit anticipe tous les scénarios possibles pour éliminer le risque.","L'imprévu est évité, mais la vie devient un exercice de contrôle permanent — épuisant."],
        vert: ["Vous percevez un signal de distance chez l'autre — réel ou imaginaire.","Vous adaptez votre comportement pour restaurer le lien.","Le lien est maintenu, mais au prix de vos propres besoins — qui finissent par peser."],
        bleu: ["Quelque chose vous échappe — une tâche, une décision, une personne.","Vous reprenez le contrôle, même au détriment de votre énergie.","La situation est maîtrisée, mais vous êtes seul·e à tout porter — et personne ne peut vous relayer."],
        indigo: ["Vous anticipez le regard de l'autre — un jugement possible.","Vous perfectionnez, retravaillez, vérifiez pour ne laisser aucune prise.","Le résultat est irréprochable, mais vous êtes épuisé·e — et la barre monte pour la prochaine fois."],
        violet: ["Une situation vous confronte à la question : qui suis-je vraiment ?","Vous endossez un rôle adapté à ce qu'on attend de vous.","Vous passez inaperçu·e, mais votre identité profonde reste en retrait — et le vide s'installe."]
    };

    const ORIGINS = {
        rouge: "À un moment de votre vie, votre corps a été source d'inquiétude — une maladie, un proche souffrant, ou simplement l'impression que la santé pouvait basculer sans prévenir. Votre système nerveux a retenu la leçon : ne jamais baisser la garde.",
        orange: "Il fut un temps où laisser entrer les émotions était trop coûteux — une souffrance qui débordait, un entourage qui ne savait pas les accueillir. Votre esprit a alors élevé un mur. Un mur qui protège — mais qui isole aussi.",
        jaune: "L'imprévu vous a déjà fait mal. Votre esprit a déduit que la sécurité viendrait de la prévision. Une stratégie brillante, devenue un piège : tout vouloir anticiper empêche parfois de vivre ce qui arrive.",
        vert: "Un jour, perdre le lien a été une douleur réelle. Votre cerveau a enregistré que l'amour devait se mériter — par la disponibilité, l'attention, l'adaptation. Une logique de survie relationnelle qui vous a protégé·e, mais qui vous épuise aujourd'hui.",
        bleu: "Vous avez appris très tôt que lâcher prise exposait à l'effondrement. Que tenir, décider, contrôler était la seule façon d'exister sans sombrer. Ce n'était pas un choix — c'était une nécessité. Aujourd'hui, cette nécessité est devenue une prison dorée.",
        indigo: "Quelque chose dans votre histoire vous a fait comprendre que l'erreur avait un coût. Pas seulement pratique — affectif, relationnel. Votre exigence est née de là : une protection contre le regard qui juge. Une armure qui vous a porté·e — mais qui pèse.",
        violet: "Il a été plus sûr de s'adapter que d'être soi. Vos émotions, vos questions, votre singularité étaient peut-être trop intenses, trop différentes. Alors vous avez appris à devenir ce que les autres attendaient. Une stratégie de survie identitaire — brillante, mais déconnectée de votre nature profonde."
    };

    const RETAINED_EXPERIENCES = {
        rouge: ["L'insouciance de ne pas penser à votre corps pendant une journée entière.","La liberté de ressentir une douleur sans y voir une menace.","Le plaisir de manger, de bouger, de vivre sans arrière‑pensée.","La confiance de laisser votre corps se reposer sans le surveiller."],
        orange: ["L'intimité d'un moment où vous auriez pu être vraiment touché·e.","La joie de pleurer sans vous demander pourquoi.","La spontanéité d'un fou rire, d'une colère saine, d'une émotion traversée.","La sensation d'être pleinement présent·e, sans distance."],
        jaune: ["L'excitation de l'imprévu, la surprise qui fait du bien.","La légèreté de ne pas avoir de plan, et de découvrir ce qui arrive.","La confiance de prendre une décision sans avoir toutes les réponses.","La liberté d'agir avant d'être certain·e."],
        vert: ["La paix de dire non sans craindre de perdre l'autre.","La certitude d'être aimé·e pour ce que vous êtes, pas pour ce que vous faites.","Le droit d'exister sans vous adapter en permanence.","L'espace de recevoir, sans avoir besoin de donner en retour."],
        bleu: ["Le soulagement de déposer les armes, de laisser quelqu'un d'autre porter.","La confiance de déléguer sans vérifier.","Le repos de ne pas être indispensable.","La douceur de recevoir de l'aide, sans la contrôler."],
        indigo: ["La liberté de faire « assez bien » et de passer à autre chose.","La fierté de montrer un travail en cours, imparfait mais vivant.","Le droit à l'erreur, sans que cela remette en cause votre valeur.","La joie de créer sans vous juger."],
        violet: ["La sensation de vous reconnaître dans un miroir, sans rôle.","La stabilité d'un « je » qui ne change pas selon les regards.","La liberté d'évoluer sans craindre de vous perdre.","L'apaisement de savoir qui vous êtes, simplement."]
    };

    const VALEUR_STEPS = [
        { lettre: 'V', nom: 'VOIR', desc: 'Reconnaître le masque au moment où il s’active.' },
        { lettre: 'A', nom: 'ACCUEILLIR', desc: 'Cesser de lutter contre l’émotion ou la pensée automatique.' },
        { lettre: 'L', nom: 'LOCALISER', desc: 'Revenir au corps, là où la peur se manifeste.' },
        { lettre: 'E', nom: 'EXPLORER', desc: 'Clarifier le conflit entre sécurité et élan de vie.' },
        { lettre: 'U', nom: 'UNIFIER', desc: 'Trouver une voie qui honore à la fois le besoin de protection et le désir d’être soi.' },
        { lettre: 'R', nom: 'RENFORCER', desc: 'Poser des actions nouvelles, alignées avec votre nature profonde.' }
    ];

    // ═══════════════ 21 DYADES VALIDÉES (inchangées) ═══════════════
    const DYADES_AMPLIFICATIONS = {
        "jaune+rouge": { nom:"Anxiété de santé amplifiée", desc:"Votre masque Rouge surveille votre corps, votre masque Jaune exige des certitudes. Chaque sensation devient une question médicale qui doit avoir une réponse — et la réponse n'est jamais assez rassurante.", boucle:["Une sensation corporelle apparaît (Rouge)","Jaune exige une certitude que la médecine ne peut pas donner","Vous cherchez des informations, consultez, vérifiez","La rassurance ne dure pas → la prochaine sensation relance le cycle"] },
        "orange+vert": { nom:"Distance paradoxale", desc:"Votre masque Orange vous coupe de vos ressentis, votre masque Vert a besoin de lien. Vous cherchez la proximité tout en restant à distance de vos émotions — l'autre ne vous atteint jamais vraiment.", boucle:["Vous avez besoin des autres (Vert)","L'émotion monte → Orange la coupe","Vous semblez froid·e ou distant·e","L'autre s'éloigne → Vert redouble d'efforts pour restaurer le lien"] },
        "jaune+vert": { nom:"Surveillance relationnelle", desc:"Votre masque Jaune a besoin de certitudes, votre masque Vert craint l'abandon. Vous surveillez les signaux de vos relations pour vérifier que tout va bien, ce qui crée une tension permanente.", boucle:["Un signal relationnel ambigu apparaît (retard, silence) — Vert l'interprète comme une distance","Jaune exige de savoir ce que cela signifie avec certitude","Vous analysez, relisez, cherchez des indices","L'autre ressent cette attention constante comme une pression — ce qui crée la distance que vous craigniez"] },
        "orange+rouge": { nom:"Le Corps sans Voix", desc:"Votre masque Rouge déclenche une vigilance corporelle, votre masque Orange coupe l'accès émotionnel. L'anxiété s'exprime par le corps sans pouvoir être nommée ni traversée.", boucle:["Une sensation corporelle anxieuse monte — Rouge déclenche l'alerte","Orange coupe l'accès émotionnel à cette anxiété","L'anxiété s'exprime par le corps, plus fort (tensions, palpitations)","La surveillance corporelle s'intensifie (Rouge), alimentant de nouveaux symptômes"] },
        "bleu+jaune": { nom:"Contrôle absolu", desc:"Votre masque Bleu a besoin de tout maîtriser, votre masque Jaune ne supporte pas l'imprévu. Vous devez tout prévoir et tout diriger — une double charge mentale épuisante.", boucle:["Quelque chose vous échappe → Bleu veut reprendre la main","L'incertitude demeure → Jaune anticipe tous les scénarios","Vous sur-planifiez et sur-contrôlez → épuisement","L'épuisement vous rend moins efficace → Bleu et Jaune s'activent encore plus"] },
        "bleu+indigo": { nom:"Exigence totale", desc:"Votre masque Bleu veut tout contrôler, votre masque Indigo veut tout réussir. Vous ne pouvez ni déléguer, ni vous satisfaire de ce qui est « assez bien ».", boucle:["Un résultat est attendu → Indigo exige la perfection","Bleu reprend la main pour s'assurer du résultat","Vous travaillez deux fois plus que nécessaire","La réussite ne suffit pas → le standard monte pour la prochaine fois"] },
        "indigo+vert": { nom:"S'effacer pour être parfait", desc:"Votre masque Vert vous pousse à vous adapter aux autres, votre masque Indigo vous impose des standards impossibles. Vous voulez être à la hauteur pour être aimé·e — et vous vous épuisez à répondre aux attentes.", boucle:["Vous percevez une attente → Vert veut y répondre","Indigo vous dit que ce n'est jamais assez bien","Vous en faites toujours plus → vous disparaissez derrière la performance","La peur du rejet et du jugement se renforcent mutuellement"] },
        "indigo+jaune": { nom:"Perfectionnisme paralysant", desc:"Votre masque Indigo exige la perfection, votre masque Jaune refuse l'incertitude. Ensemble, ils créent une paralysie : vous ne pouvez ni commencer sans garantie, ni finir sans avoir tout vérifié.", boucle:["Un projet se présente → vous voulez qu'il soit parfait (Indigo)","L'incertitude du résultat vous bloque → vous reportez (Jaune)","Le report renforce la peur de l'échec → Indigo devient plus exigeant","L'exigence accroît l'incertitude → Jaune verrouille davantage"] },
        "jaune+violet": { nom:"Rigidité identitaire", desc:"Votre masque Violet ne sait pas qui il est sans ses repères, votre masque Jaune refuse le changement. Les routines s'alourdissent pour maintenir une stabilité indispensable.", boucle:["Un changement approche — Violet perçoit une menace pour l'identité","Jaune exige de tout prévoir, ce qui est impossible","Les deux masques créent une résistance rigide — vous restez dans ce que vous connaissez","La vie rétrécit, chaque dérogation aux habitudes déclenche une anxiété"] },
        "bleu+rouge": { nom:"Le Corps sous Contrôle", desc:"Votre masque Rouge surveille le corps, votre masque Bleu transforme toute alerte en plan d'action. Le corps devient un système à optimiser.", boucle:["Une sensation corporelle attire votre attention — Rouge l'interprète comme alerte","Bleu transforme l'alerte en plan : protocoles, optimisation, discipline","Le corps résiste naturellement à la maîtrise totale","Cette résistance est interprétée comme une nouvelle défaillance — le contrôle se renforce"] },
        "rouge+vert": { nom:"Le Corps comme Lien", desc:"Votre masque Rouge génère une anxiété corporelle, votre masque Vert a besoin de connexion. La présence de l'autre apaise les symptômes, l'absence les amplifie.", boucle:["Un symptôme surgit — Rouge génère une anxiété corporelle","La solitude amplifie l'anxiété — Vert a besoin d'une présence pour la traverser","La réassurance de l'autre soulage momentanément — mais crée une dépendance","La prochaine inquiétude, seule, est plus difficile à supporter"] },
        "indigo+rouge": { nom:"Le Corps sous Exigence", desc:"Votre masque Rouge est vigilant sur le corps, votre masque Indigo impose des standards impossibles. La fatigue devient une insuffisance.", boucle:["Un signal de limite apparaît (fatigue, douleur) — Rouge l'enregistre, Indigo le juge","Des standards corporels sont appliqués de façon rigide","Le corps s'épuise sous l'exigence — il produit de nouveaux signaux","Ces signaux sont interprétés comme preuve d'insuffisance — le cycle recommence"] },

    // ═══════════════ FONCTION DE DÉTECTION CORRIGÉE ═══════════════
    function detectValidProfile(scores) {
        const VALID_DYADS = Object.keys(DYADES_AMPLIFICATIONS).map(k => k.split('+').sort());
        const VALID_TRIADS = Object.keys(TRIADES_AMPLIFICATIONS).map(k => k.split('+').sort());

        const sorted = MASKS.map(m => ({ key: m, pct: scores[m] || 0 }))
            .sort((a, b) => b.pct - a.pct || TIEBREAK.indexOf(a.key) - TIEBREAK.indexOf(b.key));

        const S1 = sorted[0].pct, S2 = sorted[1]?.pct || 0, S3 = sorted[2]?.pct || 0;

        // 1. Triade valide
        if (S1 >= 60 && S2 >= 55 && S3 >= 55 && (S1 - S3) <= 15) {
            const triadColors = [sorted[0].key, sorted[1].key, sorted[2].key].sort();
            if (VALID_TRIADS.some(t => t.join(',') === triadColors.join(','))) {
                return {
                    type: 'triade',
                    masks: triadColors,
                    primary: sorted[0].key,
                    secondary: sorted[1].key,
                    tertiary: sorted[2].key
                };
            }
        }

        // 2. Dyade valide (parmi les 3 meilleures paires)
        const candidatePairs = [
            [sorted[0].key, sorted[1].key],
            [sorted[0].key, sorted[2].key],
            [sorted[1].key, sorted[2].key]
        ];
        for (let pair of candidatePairs) {
            const pairSorted = [...pair].sort();
            if (VALID_DYADS.some(d => d.join(',') === pairSorted.join(','))) {
                const sA = scores[pairSorted[0]], sB = scores[pairSorted[1]];
                if (sA >= 55 && sB >= 55 && Math.abs(sA - sB) <= 10) {
                    const subtype = (sA >= 65) ? 'forte' : 'modérée';
                    return {
                        type: subtype === 'forte' ? 'dyade' : 'dyade_moderee',
                        masks: pairSorted,
                        primary: sA >= sB ? pairSorted[0] : pairSorted[1],
                        secondary: sA >= sB ? pairSorted[1] : pairSorted[0],
                        subtype: subtype
                    };
                }
            }
        }

        // 3. Monomasque
        if (S1 >= 75 && (S1 - S2) > 10) {
            return { type: 'mono', masks: [sorted[0].key], primary: sorted[0].key, secondary: (S2 >= 60) ? sorted[1].key : null };
        }
        if (S1 >= 60 && (S1 - S2) > 10) {
            return { type: 'mono_fort', masks: [sorted[0].key], primary: sorted[0].key };
        }

        // 4. Pan-masques
        const active60 = sorted.filter(m => m.pct >= 60);
        if (active60.length >= 5) {
            const spread = Math.max(...active60.map(m => m.pct)) - Math.min(...active60.map(m => m.pct));
            if (spread <= 20) {
                return { type: 'pan', masks: active60.map(m => m.key), primary: sorted[0].key };
            }
        }

        // 5. Adaptatif
        if (S1 < 50) {
            return { type: S1 < 30 ? 'adaptatif_eq' : 'adaptatif_vig', masks: sorted.map(m => m.key), primary: sorted[0].key };
        }

        return { type: 'residuel', masks: [sorted[0].key], primary: sorted[0].key };
    }

    function computeSPA(scores) {
        if (scores.spa !== undefined && scores.spa !== null) return parseInt(scores.spa);
        const sum = MASKS.reduce((s, m) => s + (scores[m] || 0), 0);
        return Math.round(100 - sum / 7);
    }

    // ═══════════════ CONSTRUCTION DU PORTRAIT (inchangée, mais utilise le profil corrigé) ═══════════════
    function buildPortrait(scores, profile, prenom) {
        const dom = profile.primary;
        const meta = META[dom];
        const spa = computeSPA(scores);
        let html = '';
        const maskLabel = MASK_LABELS[dom];

        html += `<div class="hero-mask" style="border-color: ${MASK_COLORS[dom]}40;">
            <span style="font-size:13px; letter-spacing:3px; text-transform:uppercase; color:${MASK_COLORS[dom]}; font-weight:500;">Votre protection principale</span>
            <div class="hero-mask-name">Masque ${maskLabel}</div>
            <div class="hero-separator"></div>
            <p class="hero-tagline">C’est le masque qui s’active le plus automatiquement en vous. Il colore vos réactions, oriente vos décisions, et influence la manière dont vos autres défenses se manifestent.</p>
            <p style="color:var(--text3); font-size:14px; margin-top:16px;">${profile.type === 'mono' || profile.type === 'mono_fort' ? 'Il agit souvent seul, concentrant l’essentiel de votre énergie défensive.' : `Il dialogue avec d’autres masques — nous vous montrons plus bas comment ils se répondent.`}</p>
        </div>`;

        html += `<div class="reminder-box" style="margin-bottom:32px;"><strong>Rappelez-vous :</strong> Vous n’êtes pas ce masque. Il est une protection, non une identité.<br>Cette stratégie n’est pas votre personnalité — elle est ce qui la recouvre.</div>`;

        html += `<div class="block"><h2>1. C'est exactement ça</h2><div class="mirror-phrase">${MIRROR[dom] || ''}</div><p style="color: var(--text2); font-size:14px; margin-top:12px;">Cette réaction n'est pas un défaut de caractère. Votre esprit a résolu un problème. Le problème a changé, mais la solution est restée. Ce n'est pas vous qui dysfonctionnez — c'est une protection qui continue de tourner alors que le danger est passé.</p></div>`;

        const steps = LOOPS[dom] || [];
        html += `<div class="block"><h2>2. Je comprends pourquoi</h2><p style="margin-bottom:16px; color:var(--text2);">Voici la boucle qui se répète, souvent sans que vous en ayez conscience :</p><div class="mechanism">${steps.map((step, i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${step}</div></div>`).join('')}</div><div class="metaphor-box">Imaginez un détecteur de fumée réglé trop sensiblement. Il protège la maison. Mais il sonne aussi quand les toasts brûlent. Votre masque fonctionne comme cela : il ne sait pas encore que la guerre est finie.</div></div>`;

        // Amplifications (dyade/triade/pan)
        if (profile.type === 'dyade' || profile.type === 'dyade_moderee' || profile.type === 'triade' || profile.type === 'pan') {
            let ampData = null;
            if (profile.type === 'pan') {
                ampData = PAN_MASQUE;
            } else {
                const sortedKeys = [...profile.masks].sort();
                const key = sortedKeys.join('+');

            }

            html += `<div class="block" style="border-left: 3px solid ${MASK_COLORS[dom]};"><h2>2bis. Quand les masques se répondent</h2>`;
            if (profile.type !== 'pan') {
                html += `<p style="color:var(--text2);">Votre configuration n'est pas une simple addition de peurs. Les masques interagissent, s'amplifient, et créent ensemble des schémas plus complexes que chacun ne le ferait seul.</p>`;
                html += `<div style="display:flex; gap:10px; margin:16px 0; flex-wrap:wrap;">${profile.masks.slice(0, 3).map(m => `<span style="background:${MASK_COLORS[m]}; color:#fff; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:500;">${MASK_LABELS[m]}</span>`).join('')}</div>`;
            }
            if (ampData) {
                html += `<p style="font-weight:600; color:var(--gold);">${ampData.nom}</p>`;
                html += `<p style="color:var(--text2);">${ampData.desc}</p>`;
                if (ampData.boucle) {
                    html += `<div class="mechanism" style="margin-top:16px;">${ampData.boucle.map((step, i) => `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${step}</div></div>`).join('')}</div>`;
                }
                if (ampData.exemples) {
                    html += `<div style="margin-top:20px;"><p style="font-weight:600; color:var(--gold); margin-bottom:10px;">Dans votre vie quotidienne, cela peut ressembler à :</p>${ampData.exemples.map(ex => `<div style="display:flex; gap:10px; margin-bottom:10px; align-items:baseline;"><span style="color:var(--gold); font-size:14px;">▸</span><span style="font-size:14px; color:var(--text2); line-height:1.6;">${ex}</span></div>`).join('')}</div>`;

                html += `<p style="color:var(--text2); font-style:italic;">Vos masques forment une combinaison unique. Ensemble, ils créent un système de protection qui mérite d'être exploré avec un accompagnement personnalisé.</p>`;
            }
            html += `</div>`;
        }

        html += `<div class="block"><h2>3. Ce n'est pas un défaut</h2><p style="color:var(--text2);">${ORIGINS[dom] || ''}</p><p style="color:var(--text2); margin-top:12px;">Des millions de personnes vivent avec ce même mécanisme. Vous n'êtes pas cassé·e. Vous êtes simplement humain·e.</p><div class="force-box"><p style="font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;">Derrière ce masque, il y a une force réelle :</p><p style="font-weight:500;margin-top:8px;">${meta.force}</p></div><p style="color:var(--text2); margin-top:8px;">Cette force n'est pas une compensation. Elle est la preuve que, sous le masque, quelqu'un de réel attend d'exister sans avoir besoin de se défendre. Votre nature vraie n'a pas disparu — elle est recouverte, intacte, et attend d'être libérée.</p></div>`;

        const experiences = RETAINED_EXPERIENCES[dom] || [];
        html += `<div class="block"><h2>3bis. Ce que ce masque a retenu en vous</h2><p style="color:var(--text2); margin-bottom:16px;">Chaque fois que le masque s'est activé pour vous protéger, il a aussi retenu quelque chose. Un élan. Une parole. Une envie. Une direction. Ces forces n'ont pas disparu. Elles sont restées en attente, comme des graines sous la neige.</p><ul style="list-style:none; padding:0;">${experiences.map(exp => `<li style="padding:8px 0; border-bottom:1px solid var(--line); color:var(--text2); font-size:15px;">✦ ${exp}</li>`).join('')}</ul><p style="color:var(--text2); margin-top:16px; font-style:italic;">Ces expériences ne sont pas perdues. Elles sont en attente. Et c'est précisément ce que la méthode V.A.L.E.U.R vous aide à retrouver.</p></div>`;

        html += `<div class="block"><h2>4. Votre carte des masques</h2><p style="color:var(--text2); margin-bottom:20px;">Voici la photographie complète de vos protections en ce moment. Chaque masque a un niveau d'emprise différent — cela n'a rien de définitif, c'est une base de départ pour mieux vous connaître.</p>`;
        const sortedMasks = [...MASKS].sort((a, b) => (scores[b] || 0) - (scores[a] || 0));
        sortedMasks.forEach(m => {
            const pct = scores[m] || 0;
            const level = getLevelLabel(pct);
            const color = MASK_COLORS[m];
            html += `<div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;"><div style="width:9px; height:9px; border-radius:50%; background:${color}; flex-shrink:0;"></div><span style="font-size:14px; font-weight:500; width:70px; color:var(--text);">${MASK_LABELS[m]}</span><div style="flex:1; height:6px; background:rgba(0,0,0,0.06); border-radius:3px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${color}; border-radius:3px;"></div></div><span style="font-size:14px; font-weight:500; width:36px; text-align:right; color:var(--text);">${pct}%</span><span style="font-size:11px; width:80px; text-align:right; color:var(--text3);">${level}</span></div>`;
        });
        html += `<div style="margin-top:28px; border-top:1px solid var(--line); padding-top:20px;"><div style="display:flex; align-items:center; gap:20px;"><div class="spa-ring" style="width:70px; height:70px;"><svg width="70" height="70" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#E5E0D8" stroke-width="6"/><circle cx="50" cy="50" r="42" fill="none" stroke="#C9A84C" stroke-width="6" stroke-dasharray="264" stroke-dashoffset="${264 * (1 - spa/100)}" stroke-linecap="round"/></svg><div class="spa-value" style="font-size:20px;">${spa}%</div></div><div><p style="font-weight:500;">Score de Présence Authentique</p><p style="color:var(--text3); font-size:14px;">${spa >= 70 ? 'Vous êtes déjà souvent vous‑même, même face aux défis.' : spa >= 40 ? 'Votre espace de liberté existe déjà. Il demande à s\'élargir.' : 'Votre masque occupe une grande place. C\'est un point de départ respectable.'} Ce score mesure les moments où vous êtes déjà vous‑même, sans masque.</p></div></div></div><p style="margin-top:24px; text-align:center;"><button class="btn-print" onclick="window.print()">Imprimer / Télécharger en PDF</button></p></div>`;

        html += `<div class="block"><h2>5. La méthode V.A.L.E.U.R</h2><p style="color:var(--text2); margin-bottom:20px;">Derrière chaque lettre du mot <strong>V.A.L.E.U.R</strong> se cache une étape concrète pour traverser le masque et retrouver votre nature profonde.</p><div style="display:flex; flex-direction:column; gap:14px;">${VALEUR_STEPS.map(step => `<div style="display:flex; align-items:flex-start; gap:14px;"><div style="width:36px; height:36px; border-radius:50%; background:var(--gold); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:16px; flex-shrink:0;">${step.lettre}</div><div><div style="font-weight:600; color:var(--gold);">${step.nom}</div><div style="font-size:14px; color:var(--text3);">${step.desc}</div></div></div>`).join('')}</div><p style="margin-top:24px; color:var(--text2); font-size:14px; text-align:center; font-style:italic;">Ce chemin est celui que nous empruntons ensemble, pas à pas, pour que vous puissiez enfin être vous‑même — sans masque.</p></div>`;

        if (profile.type.startsWith('adaptatif')) {
            html += `<div class="block"><h2>Votre profil adaptatif</h2><p style="color:var(--text2);">${ADAPTATIF.desc}</p><ul style="list-style:none; padding:0; margin-top:16px;">${ADAPTATIF.ce_qui_est_deja_la.map(item => `<li style="padding:6px 0; border-bottom:1px solid var(--line); color:var(--text2); font-size:14px;">✦ ${item}</li>`).join('')}</ul><p style="margin-top:16px; color:var(--text2); font-style:italic;">${ADAPTATIF.direction}</p></div>`;
        }

        return html;
    }

    function getLevelLabel(pct) {
        if (pct >= 85) return 'Dominant';
        if (pct >= 70) return 'Élevé';
        if (pct >= 50) return 'Significatif';
        if (pct >= 30) return 'Modéré';
        return 'Non significatif';
    }

    async function saveToGoogleSheet(email, prenom, scores, masque, profilType, spa) {
        try {
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email || '',
                    prenom: prenom || '',
                    scores: scores,
                    masque_dominant: masque,
                    profil_type: profilType,
                    spa: spa
                })
            });
        } catch (e) { console.warn('Sauvegarde silencieuse'); }
    }

    async function init() {
        const params = new URLSearchParams(window.location.search);
        let scores = null;

        const urlScores = {};
        MASKS.forEach(m => { if (params.has(m)) urlScores[m] = parseInt(params.get(m)) || 0; });
        if (params.has('spa')) urlScores.spa = parseInt(params.get('spa')) || 0;
        if (Object.keys(urlScores).length >= 7) scores = urlScores;

        if (!scores) {
            try { const s = localStorage.getItem('valeur_scores'); if (s) scores = JSON.parse(s); } catch(e) {}
        }

        if (!scores || Object.keys(scores).filter(k => MASKS.includes(k)).length < 7) {
            scores = { rouge:44, orange:38, jaune:73, vert:56, bleu:69, indigo:79, violet:32, spa:61 };
        }

        const prenom = params.get('prenom') || localStorage.getItem('valeur_prenom') || '';
        const email = params.get('email') || localStorage.getItem('valeur_email') || '';
        const profile = detectValidProfile(scores);  // Nouvelle fonction
        document.getElementById('portrait-content').innerHTML = buildPortrait(scores, profile, prenom);
        saveToGoogleSheet(email, prenom, scores, profile.primary, profile.type, computeSPA(scores));
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
